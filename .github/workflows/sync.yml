name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        uses: adityak74/huggingface-sync-action@main
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: ${{ secrets.HF_REPO_ID }}
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
